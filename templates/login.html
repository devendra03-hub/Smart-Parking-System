<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#212529);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:20px;
            width:400px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
        }

           .btn{
    width:100%;
    font-size:18px;
    border-radius:10px;
    transition:0.3s;
}

    .btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(13,110,253,.4);
}
    </style>
</head>

<body>

<div class="login-box">

    <div class="text-center mb-3">
        <h1>🅿️</h1>
        <h2>Smart Parking System</h2>
        <p class="text-muted">Secure Admin Login</p>
    </div>

    <form action="/login" method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
        </div>

        <button class="btn btn-primary">
            🔐 Login
        </button>

    </form>

    <hr>

    <div class="text-center text-muted">
        <small>
            Smart Parking Management System<br>
            Developed by <b>Devendra Mandale   &   
                PAVAN VANDULE</b><br>
            © 2026 All Rights Reserved
        </small>
    </div>

</div>

</body>
</html>
