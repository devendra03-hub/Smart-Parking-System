<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Exit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            width:500px;
            margin:60px auto;
            border:none;
            border-radius:20px;
            box-shadow:0px 5px 15px rgba(0,0,0,.2);
        }

        .card-header{
            background:#dc3545;
            color:white;
            text-align:center;
            font-size:28px;
            padding:20px;
            border-radius:20px 20px 0 0 !important;
        }
    </style>
</head>

<body>

<div class="card">

<div class="card-header">
🚙 Car Exit
</div>

<div class="card-body">

<form action="/car_exit" method="POST">

<div class="mb-3">
<label class="form-label">Car Number</label>

<input
type="text"
name="car_number"
class="form-control"
placeholder="MH12AB1234"
required>

</div>

<div class="d-grid">

<button class="btn btn-danger btn-lg">
🚙 Exit Car
</button>

</div>

</form>

<hr>

<div class="d-grid">

<a href="/dashboard" class="btn btn-secondary">
⬅ Back to Dashboard
</a>

</div>

</div>

</div>

</body>
</html>
