<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Search Car</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.container{
    margin-top:40px;
}

</style>

</head>

<body>

<div class="container">

<h2 class="text-center mb-4">
🔍 Search Parked Car
</h2>

<form method="POST">

<div class="row">

<div class="col-md-10">
<input
type="text"
name="car_number"
class="form-control"
placeholder="Enter Car Number"
required>
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100">
Search
</button>
</div>

</div>

</form>

<br>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Car Number</th>
<th>Owner</th>
<th>Slot</th>
<th>Entry Time</th>

</tr>

</thead>

<tbody>

{% for car in cars %}

<tr>

<td>{{ car[0] }}</td>
<td>{{ car[1] }}</td>
<td>{{ car[2] }}</td>
<td>{{ car[3] }}</td>
<td>{{ car[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="text-center">

<a href="/dashboard" class="btn btn-secondary">
⬅ Back to Dashboard
</a>

</div>

</div>

</body>
</html>
