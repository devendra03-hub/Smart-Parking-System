<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parking Slots</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

h2{
    text-align:center;
    margin:30px;
    font-weight:bold;
}

.slot{
    border-radius:15px;
    padding:30px;
    text-align:center;
    color:white;
    font-size:25px;
    font-weight:bold;
    margin-bottom:20px;
    box-shadow:0px 5px 15px rgba(0,0,0,.2);
}

.available{
    background:#198754;
}

.occupied{
    background:#dc3545;
}

</style>

</head>

<body>

<div class="container">

<h2>🅿️ Parking Slots</h2>

<div class="row">

{% for slot in slots %}

<div class="col-md-3">

<div class="slot {% if slot[2]=='Available' %}available{% else %}occupied{% endif %}">

{{ slot[1] }}

<br><br>

{{ slot[2] }}

</div>

</div>

{% endfor %}

</div>

<div class="text-center">

<a href="/dashboard" class="btn btn-dark btn-lg">
⬅ Back to Dashboard
</a>

</div>

</div>

</body>
</html>
