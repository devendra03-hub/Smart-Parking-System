<!DOCTYPE html>
<html>
<head>

<title>Parking Receipt</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.receipt{

    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;

    border-radius:15px;

    box-shadow:0px 0px 15px gray;

}

h2{
    text-align:center;
    color:#0d6efd;
}

hr{
    border:1px dashed black;
}

.details p{
    font-size:18px;
}

@media print {

    .no-print{
        display:none;
    }

    body{
        background:white;
    }

    .receipt{
        box-shadow:none;
        margin:auto;
    }

}

</style>

</head>

<body>


<div class="receipt">


<h2>🚗 Smart Parking System</h2>

<h4 class="text-center">
Parking Receipt
</h4>


<hr>


<div class="details">

<p>
<b>Car Number :</b> {{ car_number }}
</p>

<p>
<b>Owner Name :</b> {{ owner_name }}
</p>

<p>
<b>Parking Slot :</b> {{ slot }}
</p>

<p>
<b>Entry Time :</b> {{ entry_time }}
</p>

<p>
<b>Exit Time :</b> {{ exit_time }}
</p>

</div>


<hr>


<h4 class="text-end">

Parking Fee :
₹{{ amount }}

</h4>


<hr>


<h5 class="text-center">

Thank You! Visit Again 😊

</h5>


<div class="text-center mt-4 no-print">


<button 
class="btn btn-primary"
onclick="window.print()">

🖨 Print Receipt

</button>


<br><br>


<a href="/dashboard" class="btn btn-success">

Back to Dashboard

</a>


</div>


</div>


</body>
</html>
