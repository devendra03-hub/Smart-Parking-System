<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            max-width:550px;
            margin:60px auto;
            border:none;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            font-size:28px;
            border-radius:20px 20px 0 0 !important;
            padding:20px;
        }
    </style>
</head>

<body>

<div class="card">

<div class="card-header">
🚗 Car Entry
</div>

<div class="card-body">

<form action="/car_entry" method="POST">

<div class="mb-3">
<label class="form-label">Car Number</label>
<input type="text"
name="car_number"
class="form-control"
placeholder="MH12AB1234"
required>
</div>

<div class="mb-3">
<label class="form-label">Owner Name</label>
<input type="text"
name="owner_name"
class="form-control"
placeholder="Enter Owner Name"
required>
</div>

<div class="mb-3">
<label class="form-label">Parking Slot</label>
<input type="text"
name="slot"
class="form-control"
placeholder="A1"
required>
</div>

<div class="d-grid">
<button class="btn btn-success btn-lg">
🚗 Park Car
</button>
</div>

</form>

<br>

<div class="d-grid">
<a href="/dashboard" class="btn btn-secondary">
⬅ Back to Dashboard
</a>
</div>

</div>

</div>

</body>
</html>
