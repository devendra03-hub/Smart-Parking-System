<!DOCTYPE html>
<html>
<head>
    <title>Parking History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">
📜 Parking History
</h2>

<table class="table table-bordered table-hover table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Car Number</th>
<th>Owner</th>
<th>Slot</th>
<th>Entry Time</th>
<th>Exit Time</th>
<th>Amount</th>
</tr>

</thead>

<form method="POST" class="mb-4">

    <div class="row">

        <div class="col-md-10">
            <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search by Car Number or Owner Name">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">
                🔍 Search
            </button>
        </div>

    </div>

</form>

<tbody>

{% for car in history %}

<tr>

<td>{{ car[0] }}</td>
<td>{{ car[1] }}</td>
<td>{{ car[2] }}</td>
<td>{{ car[3] }}</td>
<td>{{ car[4] }}</td>
<td>{{ car[5] }}</td>
<td>₹{{ car[6] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="text-center">

<a href="/dashboard" class="btn btn-dark">
⬅ Back to Dashboard
</a>

</div>

</div>

</body>
</html>
