<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Parked Cars</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .container{
            margin-top:40px;
        }

        .table{
            background:white;
            border-radius:10px;
            overflow:hidden;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🚗 View Parked Cars</h2>

    <!-- Search Box -->
    <div class="row mb-4">
        <div class="col-md-6 mx-auto">

            <form action="/view_cars" method="GET" class="d-flex">

                <input
                     type="text"
                     name="search"
                     class="form-control me-2"
                     placeholder="Search Car Number"
                     value="{{ request.args.get('search','') }}">

                <button class="btn btn-primary">
                    🔍 Search
                </button>

            </form>

        </div>
    </div>

    <table class="table table-bordered table-hover table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Car Number</th>
                <th>Owner Name</th>
                <th>Parking Slot</th>
                <th>Entry Time</th>
            </tr>
        </thead>

        <tbody>

        {% for car in cars %}
        <tr>
            <td>{{ car.id }}</td>
            <td>{{ car.car_number }}</td>
            <td>{{ car.owner_name }}</td>
            <td>{{ car.slot }}</td>
            <td>{{ car.entry_time }}</td>
        </tr>
        {% endfor %}

        </tbody>

    </table>

    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-secondary">
            ⬅ Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
